<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArrowLab annotate</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header>
    <h1>ArrowLab annotate</h1>
    <div class="controls">
      <a href="/view">View →</a>
      <label>Video:
        <select id="videoSelect"></select>
      </label>
      <button id="saveBtn">Save</button>
      <span id="status"></span>
    </div>
  </header>

  <main>
    <section class="stage">
      <div class="video-wrap">
        <video id="video" preload="metadata"></video>
        <canvas id="overlay"></canvas>
      </div>
      <div class="seek">
        <input id="seekBar" type="range" min="0" max="100" step="0.01" value="0" />
        <span class="time"><span id="curTimeDisp">0:00</span> / <span id="durDisp">0:00</span></span>
      </div>
      <div class="transport">
        <button id="playPauseBtn">Play / Pause</button>
        <button data-step="-300" class="step">-300f</button>
        <button data-step="-60" class="step">-60f</button>
        <button data-step="-10" class="step">-10f</button>
        <button data-step="-1" class="step">-1f</button>
        <button data-step="1" class="step">+1f</button>
        <button data-step="10" class="step">+10f</button>
        <button data-step="60" class="step">+60f</button>
        <button data-step="300" class="step">+300f</button>
        <label class="goto">goto frame:
          <input id="gotoFrame" type="number" min="1" />
          <button id="gotoBtn">go</button>
        </label>
        <span class="frame-info">
          frame <span id="curFrame">-</span> / <span id="totalFrames">-</span>
        </span>
      </div>
    </section>

    <aside class="panel">
      <h2>Mode</h2>
      <div class="modes">
        <button data-mode="corridor">Corridor (2 clicks)</button>
        <button data-mode="target">Target face (center + rim)</button>
        <button data-mode="bbox">Target bbox (TL + BR)</button>
        <button data-mode="shot">Shot window (frame buttons)</button>
      </div>
      <div id="shotControls" class="shot-controls hidden">
        <button id="shotStartBtn">Mark shot start</button>
        <button id="shotEndBtn" disabled>Mark shot end</button>
        <button id="shotCancelBtn" disabled>Cancel pending shot</button>
      </div>
      <div class="meta">
        <label>Face diameter (m):
          <input id="faceDiameter" type="number" step="0.01" value="0.40" />
        </label>
      </div>
      <h2>Current annotation</h2>
      <pre id="annotationView"></pre>
      <div class="danger">
        <button id="clearBtn">Clear this video's annotation</button>
      </div>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
