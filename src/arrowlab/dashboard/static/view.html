<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArrowLab view</title>
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="stylesheet" href="/static/view.css" />
</head>
<body>
  <header>
    <h1>ArrowLab view</h1>
    <nav class="controls">
      <a href="/">← Annotate</a>
      <label>Video:
        <select id="videoSelect"></select>
      </label>
      <button id="refreshBtn">Refresh</button>
      <button id="playAllBtn">Play all</button>
      <button id="pauseAllBtn">Pause all</button>
      <span id="status"></span>
    </nav>
  </header>

  <main class="view-main">
    <section class="row live">
      <h2>Live session</h2>
      <div class="live-bar">
        <div class="live-meta">
          <span>Phone: <span id="phoneStatus" class="pill bad">none</span></span>
          <span>Session: <span id="sessionStatus" class="pill bad">none</span></span>
          <span>Calibrated: <span id="calibStatus" class="pill bad">no</span></span>
          <span id="shotCount">0 shots</span>
        </div>
        <button id="startSessionBtn" class="end-btn">Start session</button>
        <button id="endSessionBtn" class="end-btn" disabled>End session</button>
        <button id="captureFrameBtn" class="end-btn" disabled>Start calibration (grab frame)</button>
        <button id="shotBtn" class="shot-btn" disabled>SHOT!</button>
      </div>

      <div id="fakeSourceArea" class="fake-source-area hidden">
        <div class="fake-source-head">
          <span>Fake-phone source:</span>
          <code id="fakeSourceName"></code>
          <button id="fakeCaptureBtn" class="end-btn">Use this frame for calibration</button>
        </div>
        <video id="fakeSourceVideo" controls preload="metadata"></video>
      </div>

      <div id="calibrationArea" class="calibration-area hidden">
        <div class="calib-tools">
          <div class="modes">
            <button data-mode="corridor">Corridor (2 clicks)</button>
            <button data-mode="target">Target (center + rim)</button>
            <button data-mode="bbox">Target bbox (TL + BR)</button>
          </div>
          <label>Face diameter (m):
            <input id="calibFaceDiameter" type="number" step="0.01" value="0.40" />
          </label>
          <button id="saveCalibBtn" class="end-btn" disabled>Save calibration</button>
          <button id="clearCalibBtn" class="end-btn">Clear</button>
        </div>
        <div class="calib-stage">
          <img id="calibImage" alt="calibration frame" />
          <canvas id="calibOverlay"></canvas>
        </div>
        <pre id="calibAnnotationView"></pre>
      </div>

      <div class="live-stack">
        <video id="liveCombined" controls muted></video>
        <div id="liveLog"></div>
      </div>
    </section>

    <section class="row">
      <h2>Shot clips (raw, padded)</h2>
      <div class="row-grid" id="clipsRow"></div>
    </section>
    <section class="row">
      <h2>Tracked (detection overlay)</h2>
      <div class="row-grid" id="trackedRow"></div>
    </section>
    <section class="row combined">
      <h2>Combined synth</h2>
      <div id="combinedWrap">
        <video id="combinedVideo" controls></video>
      </div>
    </section>
  </main>

  <script src="/static/view.js"></script>
</body>
</html>
